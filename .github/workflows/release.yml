name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: react-source-learning

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: react-source-learning/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: react-source-learning
          tagName: ${{ github.ref_name }}
          releaseName: "React 源码学习 AI 导师 ${{ github.ref_name }}"
          releaseBody: |
            ## 安装

            | 平台 | 文件 |
            |------|------|
            | Windows | `.msi` 或 `.exe` 安装包 |
            | macOS | `.dmg` |
            | Linux | `.deb` 或 `.AppImage` |

            ## 更新内容

            详见 [commits](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
